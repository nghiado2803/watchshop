spring.application.name=watchshop
spring.messages.basename=messages
spring.messages.encoding=UTF-8
# C\u1ED5ng ch\u1EA1y web
server.port=8080

# K\u1EBFt n\u1ED1i SQL Server
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=WatchShopDB;encrypt=true;trustServerCertificate=true
spring.datasource.username=vannghia
spring.datasource.password=123456

# C\u1EA5u h\u00ECnh JPA
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# --- C\u1EA4U H\u00CCNH UPLOAD FILE (B\u1EAET BU\u1ED8C) ---
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# --- C\u1EA4U H\u00CCNH TOMCAT (Quan tr\u1ECDng cho b\u1EA3n Tomcat 11 b\u1EA1n \u0111ang d\u00F9ng) ---
# T\u0103ng k\u00EDch th\u01B0\u1EDBc t\u1ED1i \u0111a c\u1EE7a Form data
server.tomcat.max-http-form-post-size=50MB
# Cho ph\u00E9p nh\u1EADn d\u1EEF li\u1EC7u l\u1EDBn
server.tomcat.max-swallow-size=-1
