<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body class="bg-light">

<div th:replace="~{fragments/header :: client-navbar}"></div>
<div style="height: 80px;"></div>

<div class="container text-center mt-5">
    <div class="card shadow-lg border-0 rounded-4 d-inline-block p-5">
        <i class="bi bi-exclamation-triangle display-1 text-danger"></i>
        <h1 class="display-4 fw-bold mt-3" th:text="${status} ?: 'Error'">Error</h1>
        <p class="lead text-muted" th:text="${error} ?: 'Đã xảy ra lỗi không mong muốn.'"></p>
        <a th:href="@{/}" class="btn btn-primary mt-3 px-4 rounded-pill">Về trang chủ</a>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
