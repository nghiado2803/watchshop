<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<div th:fragment="chat-widget">

    <div class="chat-floating-buttons">
        <button class="btn-float btn-ai mb-2" onclick="toggleChat('ai')" title="Trợ lý AI">
            <i class="bi bi-robot"></i>
        </button>
        <button class="btn-float btn-admin" onclick="toggleChat('admin')" title="Chat với Admin">
            <i class="bi bi-headset"></i>
            <span id="admin-notify-dot" class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle d-none"></span>
        </button>
    </div>

    <div id="chat-box-ai" class="chat-box d-none">
        <div class="chat-header bg-gradient-ai text-white">
            <div class="d-flex align-items-center">
                <i class="bi bi-robot fs-4 me-2"></i>
                <div>
                    <h6 class="mb-0 fw-bold">WatchShop AI</h6>
                    <small class="opacity-75">Luôn sẵn sàng 24/7</small>
                </div>
            </div>
            <button class="btn-close-chat" onclick="toggleChat('ai')"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="chat-body d-flex flex-column gap-2" id="ai-messages">
            <div class="message bot-msg">
                Xin chào! Tôi là AI của WatchShop. Tôi có thể giúp gì cho bạn về chọn đồng hồ không? 🤖
            </div>
        </div>
        <div class="chat-footer">
            <input type="text" id="ai-input" class="form-control" placeholder="Hỏi AI..." onkeypress="handleEnter(event, 'ai')">
            <button class="btn-send" onclick="sendMessageAI()"><i class="bi bi-send-fill"></i></button>
        </div>
    </div>

    <div id="chat-box-admin" class="chat-box d-none">
        <div class="chat-header bg-dark text-white">
            <div class="d-flex align-items-center">
                <div class="position-relative me-2">
                    <img src="https://ui-avatars.com/api/?name=Admin&background=d0021b&color=fff" class="rounded-circle" width="35">
                    <span class="position-absolute bottom-0 start-100 translate-middle p-1 bg-success border border-light rounded-circle"></span>
                </div>
                <div>
                    <h6 class="mb-0 fw-bold">Hỗ trợ viên</h6>
                    <small class="text-success" style="font-size: 0.75rem;">● Đang trực tuyến</small>
                </div>
            </div>
            <button class="btn-close-chat" onclick="toggleChat('admin')"><i class="bi bi-x-lg"></i></button>
        </div>

        <div class="chat-body d-flex flex-column gap-2" id="admin-messages">
        </div>

        <div class="chat-footer align-items-center">
            <label class="btn btn-sm text-secondary p-0 me-2" style="cursor: pointer;">
                <i class="bi bi-image fs-5"></i>
                <input type="file" id="client-img-input" accept="image/*" style="display: none;" onchange="sendImageClient()">
            </label>

            <input type="text" id="admin-input" class="form-control" placeholder="Nhập tin nhắn..." onkeypress="handleEnter(event, 'admin')">
            <button class="btn-send" onclick="sendMessageAdmin()"><i class="bi bi-send-fill"></i></button>
        </div>
    </div>

    <style>
        .chat-floating-buttons { position: fixed; bottom: 30px; right: 30px; z-index: 10000; display: flex; flex-direction: column; align-items: flex-end; }
        .btn-float { width: 55px; height: 55px; border-radius: 50%; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2); font-size: 1.5rem; transition: transform 0.2s; position: relative; display: flex; align-items: center; justify-content: center; }
        .btn-float:hover { transform: scale(1.1); }
        .btn-ai { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-admin { background-color: #1a1a1a; color: white; }

        .chat-box { position: fixed; bottom: 100px; right: 30px; width: 350px; height: 450px; background: #fff; border-radius: 12px; z-index: 10000; box-shadow: 0 5px 25px rgba(0,0,0,0.15); display: flex; flex-direction: column; overflow: hidden; animation: slideIn 0.3s cubic-bezier(0.165, 0.84, 0.44, 1); }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .chat-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .bg-gradient-ai { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .btn-close-chat { background: none; border: none; color: rgba(255,255,255,0.8); font-size: 1.2rem; }

        .chat-body { flex: 1; padding: 15px; overflow-y: auto; background-color: #f8f9fa; display: flex; flex-direction: column; }
        .message { max-width: 85%; padding: 10px 12px; border-radius: 15px; font-size: 0.9rem; line-height: 1.4; word-wrap: break-word; margin-bottom: 4px; }

        /* Tin nhắn từ Admin / Bot (Bên trái) */
        .bot-msg { background: #fff; border: 1px solid #eee; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }

        /* Tin nhắn từ chính mình - User (Bên phải) */
        .user-msg { background: #d0021b; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }

        .chat-footer { padding: 10px; background: #fff; border-top: 1px solid #eee; display: flex; }
        .chat-footer input { border-radius: 20px; font-size: 0.9rem; padding-left: 15px; }
        .btn-send { background: none; border: none; color: #d0021b; font-size: 1.2rem; padding: 0 10px; }
    </style>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script th:inline="javascript">
        const currentUser = /*[[${#authentication.name}]]*/ 'anonymousUser';
        let clientSessionId = null;

        function toggleChat(type) {
            const boxAi = document.getElementById('chat-box-ai');
            const boxAdmin = document.getElementById('chat-box-admin');
            if (type === 'ai') {
                boxAdmin.classList.add('d-none');
                boxAi.classList.toggle('d-none');
            } else {
                if (currentUser === 'anonymousUser') {
                    if(confirm('Vui lòng đăng nhập để chat với hỗ trợ viên.')) window.location.href = '/login';
                    return;
                }
                boxAi.classList.add('d-none');
                boxAdmin.classList.toggle('d-none');
                if (!boxAdmin.classList.contains('d-none')) initChatSession();
            }
        }

        function initChatSession() {
            $.get('/api/chat/my-messages', function(data) {
                clientSessionId = data.sessionId;
                renderMessages(data.messages);
                if(window.clientChatInterval) clearInterval(window.clientChatInterval);
                window.clientChatInterval = setInterval(fetchNewMessages, 4000);
            }).fail(function() {
                $.post('/api/chat/start', function(res) { clientSessionId = res.id; });
            });
        }

        function renderMessages(messages) {
            const container = document.getElementById('admin-messages');
            container.innerHTML = '';
            messages.forEach(msg => {
                const div = document.createElement('div');
                // LOGIC: Nếu role là USER thì cho sang PHẢI, nếu ADMIN thì sang TRÁI
                const isMine = (msg.role === 'USER' || msg.role === 'ROLE_USER');
                div.className = `message ${isMine ? 'user-msg' : 'bot-msg'}`;

                let html = '';
                if(msg.content) html += `<div>${msg.content}</div>`;
                if(msg.imageUrl) html += `<img src="/images/${msg.imageUrl}" style="max-width: 100%; border-radius: 8px; margin-top: 5px; cursor:pointer" onclick="window.open(this.src)">`;
                if(msg.product) {
                    html += `
                        <div class="mt-2 bg-light p-2 rounded text-dark border shadow-sm" style="min-width: 200px;">
                            <img src="/images/${msg.product.imageUrl}" class="w-100 rounded mb-1" style="height: 100px; object-fit: contain;">
                            <small class="fw-bold d-block text-truncate">${msg.product.name}</small>
                            <span class="text-danger fw-bold small">${new Intl.NumberFormat('vi-VN').format(msg.product.price)} ₫</span>
                            <a href="/product/${msg.product.id}" class="btn btn-sm btn-outline-danger w-100 py-0 mt-1" style="font-size: 11px;">Xem chi tiết</a>
                        </div>`;
                }
                div.innerHTML = html;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        function fetchNewMessages() {
            if(!clientSessionId) return;
            $.get(`/api/chat/messages/${clientSessionId}`, function(data) { renderMessages(data); });
        }

        function sendMessageAdmin() {
            const input = document.getElementById('admin-input');
            const text = input.value.trim();
            if (!text || !clientSessionId) return;
            $.post('/api/chat/send', { sessionId: clientSessionId, content: text }, function() {
                input.value = '';
                fetchNewMessages();
            });
        }

        function sendImageClient() {
            const fileInput = document.getElementById('client-img-input');
            if(fileInput.files.length === 0 || !clientSessionId) return;
            let formData = new FormData();
            formData.append('sessionId', clientSessionId);
            formData.append('file', fileInput.files[0]);
            $.ajax({
                url: '/api/chat/upload',
                type: 'POST',
                data: formData,
                processData: false,
                contentType: false,
                success: function() { fetchNewMessages(); }
            });
        }

        function handleEnter(e, type) { if (e.key === 'Enter') { if(type === 'ai') sendMessageAI(); else sendMessageAdmin(); } }

        function sendMessageAI() {
            const input = document.getElementById('ai-input');
            const msgText = input.value.trim();
            if (!msgText) return;
            const container = document.getElementById('ai-messages');

            // Tin nhắn user (Phải)
            const userDiv = document.createElement('div');
            userDiv.className = 'message user-msg';
            userDiv.innerText = msgText;
            container.appendChild(userDiv);

            input.value = '';
            container.scrollTop = container.scrollHeight;

            // AI trả lời (Trái)
            setTimeout(() => {
                const replyDiv = document.createElement('div');
                replyDiv.className = 'message bot-msg';
                replyDiv.innerText = getAIResponse(msgText);
                container.appendChild(replyDiv);
                container.scrollTop = container.scrollHeight;
            }, 1000);
        }

        function getAIResponse(text) {
            text = text.toLowerCase();
            if (text.includes('giá')) return 'Dạ, shop có nhiều mẫu từ 2-500 triệu ạ.';
            if (text.includes('bảo hành')) return 'Bảo hành 5 năm chính hãng ạ.';
            return 'Dạ em chưa hiểu, bạn hỏi về giá hay bảo hành ạ?';
        }
    </script>
</div>
</html>
