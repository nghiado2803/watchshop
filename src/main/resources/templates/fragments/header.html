<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} ?: 'Watch Shop'">Watch Shop</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; color: #1a1a1a; }
        /* CSS cũ giữ nguyên */
        .admin-sidebar { background: #1e293b; color: #fff; min-height: 100vh; box-shadow: 4px 0 24px rgba(0,0,0,0.1); }
        .admin-sidebar .nav-link { color: #94a3b8; border-radius: 0.5rem; margin-bottom: 0.25rem; }
        .admin-sidebar .nav-link:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .admin-sidebar .nav-link.active { background: #3b82f6; color: #fff; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.5); }
        .navbar-luxury { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05); padding: 15px 0; transition: all 0.3s; }
        .brand-text { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 1.5rem; color: #1a1a1a; letter-spacing: -0.5px; text-decoration: none; }
        .brand-text span { color: #d0021b; }
        .nav-link-luxury { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: #555 !important; padding: 0 15px !important; transition: 0.3s; position: relative; }
        .nav-link-luxury:hover, .nav-link-luxury.active { color: #000 !important; }
        .nav-link-luxury::after { content: ''; position: absolute; bottom: -5px; left: 50%; width: 0; height: 2px; background: #d0021b; transition: all 0.3s; transform: translateX(-50%); }
        .nav-link-luxury:hover::after, .nav-link-luxury.active::after { width: 30px; }
        .action-icon { font-size: 1.2rem; color: #333; margin-left: 15px; position: relative; transition: 0.2s; cursor: pointer; background: none; border: none; padding: 0; text-decoration: none; }
        .action-icon:hover { color: #d0021b; transform: translateY(-2px); }
        .cart-badge { position: absolute; top: -5px; right: -8px; background: #d0021b; color: white; font-size: 0.6rem; font-weight: 700; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .dropdown-menu-luxury { border: none; border-radius: 0; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-top: 15px; }
        .dropdown-item { padding: 10px 20px; font-size: 0.9rem; }
        .dropdown-item:active { background-color: #f8f9fa; color: #000; }
        .hover-red:hover { color: #d0021b !important; }
    </style>
</head>
<body>

<div th:fragment="admin-sidebar" class="d-flex flex-column flex-shrink-0 p-3 admin-sidebar" style="width: 280px; position: fixed; top: 0; bottom: 0; left: 0; z-index: 1050;">
    <a th:href="@{/admin/dashboard}" class="d-flex align-items-center mb-4 text-white text-decoration-none px-2">
        <i class="bi bi-watch-fill fs-3 me-2 text-primary"></i>
        <span class="fs-5 fw-bold" th:text="#{admin.dashboardTitle}">Admin Panel</span>
    </a>
    <hr class="border-secondary mb-4">
    <ul class="nav nav-pills flex-column mb-auto">
        <li class="nav-item"><a th:href="@{/admin/dashboard}" class="nav-link px-3" th:classappend="${requestURI == '/admin/dashboard'} ? 'active'"><i class="bi bi-grid-fill me-2"></i> <span th:text="#{nav.dashboard}">Tổng quan</span></a></li>
        <li><a th:href="@{/admin/manage-products}" class="nav-link px-3" th:classappend="${requestURI != null and requestURI.contains('products')} ? 'active'"><i class="bi bi-box-seam-fill me-2"></i> <span th:text="#{nav.manageProducts}">Sản phẩm</span></a></li>
        <li><a th:href="@{/admin/manage-categories}" class="nav-link px-3" th:classappend="${requestURI != null and requestURI.contains('categories')} ? 'active'"><i class="bi bi-tags-fill me-2"></i> <span th:text="#{nav.manageCategories}">Danh mục</span></a></li>
        <li><a th:href="@{/admin/manage-users}" class="nav-link px-3" th:classappend="${requestURI != null and requestURI.contains('users')} ? 'active'"><i class="bi bi-people-fill me-2"></i> <span th:text="#{nav.manageUsers}">Người dùng</span></a></li>
        <li><a th:href="@{/admin/manage-orders}" class="nav-link px-3" th:classappend="${requestURI != null and requestURI.contains('orders')} ? 'active'"><i class="bi bi-cart-check-fill me-2"></i> <span th:text="#{nav.manageOrders}">Đơn hàng</span></a></li>
        <li>
            <a th:href="@{/admin/chat}" class="nav-link px-3" th:classappend="${requestURI != null and requestURI.contains('chat')} ? 'active'">
                <i class="bi bi-chat-dots-fill me-2"></i>
                <span th:text="#{nav.customerSupport}">Tư vấn khách hàng</span>
                <span class="badge bg-danger rounded-pill ms-auto" style="font-size: 0.7rem;"
                      th:text="${unreadMessages} ?: 0" th:if="${unreadMessages != null && unreadMessages > 0}"></span>
            </a>
        </li>
        <li><a th:href="@{/admin/stats}" class="nav-link px-3" th:classappend="${requestURI != null and requestURI.contains('stats')} ? 'active'"><i class="bi bi-bar-chart-fill me-2"></i> <span th:text="#{admin.stats}">Thống kê</span></a></li>

        <li class="mt-5 pt-3 border-top border-secondary">
            <a th:href="@{/}" class="nav-link px-3 text-warning"><i class="bi bi-box-arrow-up-right me-2"></i> Website</a>
        </li>
    </ul>
    <div class="dropdown mt-3">
        <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle p-2 rounded hover-bg-light" data-bs-toggle="dropdown">
            <div class="bg-primary rounded-circle d-flex align-items-center justify-content-center me-2" style="width: 32px; height: 32px;">A</div>
            <strong>Admin</strong>
        </a>
        <ul class="dropdown-menu dropdown-menu-dark text-small shadow">
            <li><form th:action="@{/logout}" method="post"><button class="dropdown-item text-danger" th:text="#{nav.logout}">Đăng xuất</button></form></li>
        </ul>
    </div>
</div>

<nav th:fragment="client-navbar" class="navbar navbar-expand-lg navbar-luxury fixed-top">
    <div class="container">
        <a class="brand-text" th:href="@{/}">WATCH<span>STORE</span></a>

        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarMain">
            <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link nav-link-luxury" th:href="@{/}" th:classappend="${requestURI == '/'} ? 'active'" th:text="#{nav.home}">Trang chủ</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-link-luxury" th:href="@{/products}" th:classappend="${requestURI != null and requestURI.contains('/products')} ? 'active'" th:text="#{nav.products}">Sản phẩm</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-link-luxury" th:href="@{/cart}" th:classappend="${requestURI != null and requestURI.contains('/cart')} ? 'active'" th:text="#{nav.cart}">Giỏ hàng</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-link-luxury" href="#footer-contact" th:text="#{nav.contact}">Liên hệ</a>
                </li>
            </ul>

            <div class="d-flex align-items-center">
                <a th:href="@{/products}" class="action-icon" title="Tìm kiếm">
                    <i class="bi bi-search"></i>
                </a>

                <a th:href="@{/orders}" class="action-icon" title="Lịch sử đơn hàng" sec:authorize="isAuthenticated()">
                    <i class="bi bi-receipt"></i>
                </a>

                <a th:href="@{/cart}" class="action-icon position-relative" title="Giỏ hàng">
                    <i class="bi bi-bag"></i>
                    <span class="cart-badge" th:text="${cartCount} ?: 0">0</span>
                </a>

                <div class="ms-3 border-end pe-3">
                    <div sec:authorize="!isAuthenticated()">
                        <a th:href="@{/account/login}" class="text-decoration-none text-dark fw-bold small ms-2 hover-red" th:text="#{nav.login}">Login</a>
                        <span class="text-muted mx-1">/</span>
                        <a th:href="@{/account/register}" class="text-decoration-none text-dark fw-bold small hover-red" th:text="#{nav.register}">Register</a>
                    </div>

                    <div sec:authorize="isAuthenticated()" class="dropdown">
                        <a class="action-icon dropdown-toggle d-flex align-items-center text-decoration-none" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle fs-5"></i>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end dropdown-menu-luxury">
                            <li><h6 class="dropdown-header text-uppercase text-muted small" sec:authentication="name">User</h6></li>

                            <li><a class="dropdown-item" th:href="@{/account/profile}"><i class="bi bi-person me-2"></i> <span th:text="#{nav.profile}">Hồ sơ</span></a></li>
                            <li><a class="dropdown-item" th:href="@{/orders}"><i class="bi bi-receipt me-2"></i> <span th:text="#{nav.myOrders}">Đơn hàng</span></a></li>

                            <li sec:authorize="hasRole('ADMIN')"><hr class="dropdown-divider"><a class="dropdown-item text-primary fw-bold" th:href="@{/admin/dashboard}" th:text="#{nav.admin}">Admin</a></li>

                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <form th:action="@{/logout}" method="post" class="m-0">
                                    <button class="dropdown-item text-danger"><i class="bi bi-box-arrow-right me-2"></i> <span th:text="#{nav.logout}">Đăng xuất</span></button>
                                </form>
                            </li>
                        </ul>
                    </div>
                </div>

                <div class="dropdown ms-3">
                    <a class="action-icon text-muted small text-decoration-none dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                        <i class="bi bi-globe2 me-1"></i>
                        <span th:text="${#locale.language == 'en' ? 'EN' : 'VI'}">VI</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end dropdown-menu-luxury" style="min-width: 100px;">
                        <li>
                            <a class="dropdown-item d-flex align-items-center" th:href="@{''(lang='vi')}">
                                <img src="https://flagcdn.com/w20/vn.png" class="me-2" style="width: 20px;"> Tiếng Việt
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item d-flex align-items-center" th:href="@{''(lang='en')}">
                                <img src="https://flagcdn.com/w20/us.png" class="me-2" style="width: 20px;"> English
                            </a>
                        </li>
                    </ul>
                </div>

            </div>
        </div>
    </div>
</nav>

</body>
</html>
