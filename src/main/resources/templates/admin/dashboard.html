<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body class="bg-light">

<div th:replace="~{fragments/header :: admin-sidebar}"></div>

<div style="margin-left: 280px;">
    <div class="container-fluid p-4">
        <h3 class="fw-bold mb-4 text-dark">Tổng quan</h3>

        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="card border-0 shadow-sm rounded-4 p-3 h-100">
                    <div class="d-flex align-items-center">
                        <div class="bg-primary bg-opacity-10 text-primary rounded-3 p-3">
                            <i class="bi bi-currency-dollar fs-3"></i>
                        </div>
                        <div class="ms-3">
                            <p class="text-muted small mb-0 text-uppercase fw-bold">Tổng doanh thu</p>
                            <h3 class="fw-bold mb-0 text-dark"
                                th:text="${#numbers.formatDecimal(totalRevenue, 0, 'COMMA', 0, 'POINT')} + ' ₫'">0 ₫</h3>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card border-0 shadow-sm rounded-4 p-3 h-100">
                    <div class="d-flex align-items-center">
                        <div class="bg-warning bg-opacity-10 text-warning rounded-3 p-3">
                            <i class="bi bi-cart-check fs-3"></i>
                        </div>
                        <div class="ms-3">
                            <p class="text-muted small mb-0 text-uppercase fw-bold">Đơn chờ xử lý</p>
                            <h3 class="fw-bold mb-0 text-dark" th:text="${newOrdersCount}">0</h3>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card border-0 shadow-sm rounded-4 p-3 h-100">
                    <div class="d-flex align-items-center">
                        <div class="bg-info bg-opacity-10 text-info rounded-3 p-3">
                            <i class="bi bi-people fs-3"></i>
                        </div>
                        <div class="ms-3">
                            <p class="text-muted small mb-0 text-uppercase fw-bold">Khách đăng ký mới</p>
                            <h3 class="fw-bold mb-0 text-dark" th:text="${newCustomersCount}">0</h3>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                <h6 class="fw-bold mb-0">Đơn hàng vừa đặt</h6>
                <a th:href="@{/admin/manage-orders}" class="btn btn-sm btn-outline-primary rounded-pill">Xem tất cả</a>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                        <tr>
                            <th>Mã đơn</th>
                            <th>Khách hàng</th>
                            <th>Ngày đặt</th>
                            <th>Tổng tiền</th>
                            <th>Trạng thái</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="order : ${recentOrders}">
                            <td class="fw-bold text-primary" th:text="${'#' + order.id}">#ID</td>
                            <td th:text="${order.fullName}">Tên khách</td>
                            <td th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}">Time</td>
                            <td class="fw-bold"
                                th:text="${#numbers.formatDecimal(order.totalPrice, 0, 'COMMA', 0, 'POINT')} + ' ₫'">Tiền</td>
                            <td>
                                    <span class="badge rounded-pill px-3 py-2"
                                          th:classappend="${order.status == 'Hoàn thành' ? 'bg-success bg-opacity-10 text-success' :
                                                           (order.status == 'Chờ xác nhận' ? 'bg-warning bg-opacity-10 text-warning' : 'bg-secondary bg-opacity-10 text-secondary')}"
                                          th:text="${order.status}">Status</span>
                            </td>
                        </tr>

                        <tr th:if="${recentOrders.isEmpty()}">
                            <td colspan="5" class="text-center py-4 text-muted">Chưa có đơn hàng nào.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <footer th:replace="~{fragments/footer :: footer}"></footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
