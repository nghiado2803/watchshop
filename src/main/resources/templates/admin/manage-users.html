<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body class="bg-light">

<div th:replace="~{fragments/header :: admin-sidebar}"></div>

<div style="margin-left: 280px;">
    <div class="container-fluid p-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold text-dark">Quản lý người dùng</h3>
            <div class="d-flex gap-2">
                <button class="btn btn-success fw-bold shadow-sm rounded-pill px-4"
                        onclick="clearForm()" data-bs-toggle="modal" data-bs-target="#userModal">
                    <i class="bi bi-person-plus-fill me-2"></i>Thêm User
                </button>
            </div>
        </div>

        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light text-secondary">
                    <tr>
                        <th class="ps-4 py-3">Người dùng</th>
                        <th class="py-3">Liên hệ</th>
                        <th class="py-3">Vai trò</th>
                        <th class="py-3">Trạng thái</th>
                        <th class="text-end pe-4 py-3">Tác vụ</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user : ${users}">
                        <td class="ps-4">
                            <div class="d-flex align-items-center">
                                <div class="bg-gradient bg-primary text-white rounded-circle d-flex align-items-center justify-content-center fw-bold shadow-sm"
                                     style="width: 40px; height: 40px;"
                                     th:text="${user.fullName != null && user.fullName.length() > 0 ? #strings.substring(user.fullName, 0, 1) : 'U'}">A</div>
                                <div class="ms-3">
                                    <h6 class="fw-bold mb-0 text-dark" th:text="${user.fullName}">Tên</h6>
                                    <small class="text-muted" th:text="'ID: #' + ${user.id}">ID</small>
                                </div>
                            </div>
                        </td>
                        <td>
                            <div class="d-flex flex-column">
                                <span class="text-dark small"><i class="bi bi-envelope-fill me-2 text-warning"></i>[[${user.email}]]</span>
                                <span class="text-muted small"><i class="bi bi-telephone-fill me-2 text-success"></i>[[${user.phoneNumber}]]</span>
                            </div>
                        </td>
                        <td>
                            <span th:class="${user.role == 'ROLE_ADMIN' ? 'badge bg-danger bg-opacity-10 text-danger border border-danger border-opacity-10' : 'badge bg-info bg-opacity-10 text-info border border-info border-opacity-10'}"
                                  th:text="${user.role}">Role</span>
                        </td>
                        <td>
                            <span th:if="${user.enabled}" class="badge bg-success bg-opacity-10 text-success rounded-pill px-3">
                                <i class="bi bi-check-circle-fill me-1"></i>Hoạt động
                            </span>
                            <span th:unless="${user.enabled}" class="badge bg-warning bg-opacity-10 text-warning rounded-pill px-3 border border-warning">
                                <i class="bi bi-hourglass-split me-1"></i>Chờ duyệt / Khóa
                            </span>
                        </td>
                        <td class="text-end pe-4">
                            <button class="btn btn-sm btn-light text-primary shadow-sm rounded-circle me-1"
                                    th:attr="onclick=|openEditModal('${user.id}', '${user.fullName}', '${user.email}', '${user.phoneNumber}', '${user.address}', '${user.role}', ${user.enabled})|"
                                    title="Sửa thông tin">
                                <i class="bi bi-pencil-fill"></i>
                            </button>

                            <a th:href="@{/admin/users/toggle-status/{id}(id=${user.id})}"
                               class="btn btn-sm shadow-sm rounded-circle"
                               th:classappend="${user.enabled} ? 'btn-light text-danger' : 'btn-primary text-white'"
                               th:title="${user.enabled} ? 'Khóa tài khoản' : 'Duyệt / Mở khóa'"
                               onclick="return confirm('Xác nhận thay đổi trạng thái user này?');">
                                <i th:class="${user.enabled} ? 'bi bi-lock-fill' : 'bi bi-check-lg'"></i>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <footer th:replace="~{fragments/footer :: footer}"></footer>
</div>

<div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content border-0 rounded-4 shadow">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold text-primary" id="userModalLabel">Thông tin người dùng</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form th:action="@{/admin/users/save}" method="post" th:object="${userObj}">
                    <input type="hidden" id="u_id" name="id">

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted">Họ và tên</label>
                            <input type="text" id="u_name" name="fullName" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted">Số điện thoại</label>
                            <input type="text" id="u_phone" name="phoneNumber" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted">Email (Tên đăng nhập)</label>
                            <input type="email" id="u_email" name="email" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted">Mật khẩu</label>
                            <input type="password" name="password" class="form-control" placeholder="Để trống nếu không đổi">
                            <small class="text-muted" style="font-size: 0.75rem;">* Chỉ nhập khi tạo mới hoặc muốn đổi pass</small>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label small fw-bold text-muted">Địa chỉ</label>
                            <input type="text" id="u_address" name="address" class="form-control">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted">Vai trò</label>
                            <select id="u_role" name="role" class="form-select">
                                <option value="ROLE_USER">Người dùng (USER)</option>
                                <option value="ROLE_ADMIN">Quản trị viên (ADMIN)</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted">Trạng thái</label>
                            <div class="form-check form-switch mt-2">
                                <input class="form-check-input" type="checkbox" id="u_enabled" name="enabled">
                                <label class="form-check-label" for="u_enabled">Cho phép hoạt động</label>
                            </div>
                        </div>
                    </div>

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary rounded-pill fw-bold py-2">
                            <i class="bi bi-save me-2"></i>Lưu thông tin
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    function clearForm() {
        document.getElementById('userModalLabel').innerText = 'Thêm người dùng mới';
        document.getElementById('u_id').value = '';
        document.getElementById('u_name').value = '';
        document.getElementById('u_email').value = '';
        document.getElementById('u_phone').value = '';
        document.getElementById('u_address').value = '';
        document.getElementById('u_role').value = 'ROLE_USER';
        document.getElementById('u_enabled').checked = true; // Mặc định thêm mới là bật
    }

    function openEditModal(id, name, email, phone, address, role, enabled) {
        var myModal = new bootstrap.Modal(document.getElementById('userModal'));
        myModal.show();

        document.getElementById('userModalLabel').innerText = 'Cập nhật người dùng';
        document.getElementById('u_id').value = id;
        document.getElementById('u_name').value = name;
        document.getElementById('u_email').value = email;
        document.getElementById('u_phone').value = (phone === 'null') ? '' : phone;
        document.getElementById('u_address').value = (address === 'null') ? '' : address;
        document.getElementById('u_role').value = role;
        document.getElementById('u_enabled').checked = enabled;
    }
</script>

</body>
</html>
