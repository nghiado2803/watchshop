<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body class="bg-light">

<div th:replace="~{fragments/header :: admin-sidebar}"></div>

<div class="container-fluid" style="margin-left: 280px; width: calc(100% - 280px); height: 100vh; display: flex; flex-direction: column;">

    <div class="py-3 px-4 bg-white border-bottom d-flex justify-content-between align-items-center">
        <h4 class="fw-bold mb-0 text-primary"><i class="bi bi-chat-square-text-fill me-2"></i>Live Chat Center</h4>
        <span class="badge bg-success bg-opacity-10 text-success border border-success px-3 py-2 rounded-pill">
            <i class="bi bi-circle-fill me-1" style="font-size: 8px;"></i> Đang trực tuyến
        </span>
    </div>

    <div class="row g-0 flex-grow-1 overflow-hidden">
        <div class="col-md-3 bg-white border-end d-flex flex-column h-100">
            <div class="p-3 border-bottom">
                <input type="text" class="form-control bg-light" placeholder="Tìm khách hàng...">
            </div>
            <div class="flex-grow-1 overflow-auto">
                <div class="list-group list-group-flush" id="session-list">
                    <a th:each="s : ${sessions}" href="javascript:void(0)" class="list-group-item list-group-item-action p-3 border-0"
                       th:attr="onclick=|loadChat('${s.id}', '${s.user.fullName}')|">
                        <div class="d-flex align-items-center">
                            <img th:src="'https://ui-avatars.com/api/?name=' + ${s.user.fullName}" class="rounded-circle" width="45">
                            <div class="ms-3 overflow-hidden">
                                <h6 class="mb-0 fw-bold text-truncate" th:text="${s.user.fullName}">Name</h6>
                                <small class="text-muted" th:text="${#temporals.format(s.updatedAt, 'HH:mm dd/MM')}"></small>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
        </div>

        <div class="col-md-9 bg-light d-flex flex-column h-100 position-relative">
            <div class="p-3 bg-white border-bottom shadow-sm d-flex justify-content-between align-items-center">
                <h5 class="mb-0 fw-bold" id="chat-user-name">Chọn khách hàng để chat</h5>
                <input type="hidden" id="current-session-id">
            </div>

            <div class="flex-grow-1 p-4 overflow-auto" id="chat-box" style="background: #f4f7f6;">
            </div>

            <div class="p-3 bg-white border-top">
                <div id="image-preview" class="d-none mb-2 position-relative" style="width: fit-content;">
                    <img id="img-upload-preview" src="" style="max-height: 100px; border-radius: 8px; border: 1px solid #ddd;">
                    <button onclick="cancelImage()" class="btn btn-sm btn-danger rounded-circle position-absolute top-0 start-100 translate-middle">x</button>
                </div>

                <div class="input-group">
                    <label class="btn btn-light text-secondary border-end-0" style="cursor: pointer;">
                        <i class="bi bi-image"></i>
                        <input type="file" id="image-input" accept="image/*" style="display: none;" onchange="previewImage(this)">
                    </label>
                    <button class="btn btn-light text-secondary" data-bs-toggle="modal" data-bs-target="#productSelectModal"><i class="bi bi-bag-plus"></i></button>
                    <input type="text" id="msg-input" class="form-control bg-light border-0" placeholder="Nhập tin nhắn..." onkeypress="handleEnter(event)">
                    <button class="btn btn-primary px-4 fw-bold" onclick="sendMessage()"><i class="bi bi-send-fill"></i> Gửi</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="productSelectModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold">Chọn sản phẩm tư vấn</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body bg-light">
                <div class="row g-3">
                    <div class="col-md-4" th:each="p : ${@productRepository.findAll()}">
                        <div class="card h-100 cursor-pointer shadow-sm border-0" th:onclick="|sendProduct('${p.id}')|" data-bs-dismiss="modal">
                            <div class="card-body p-2 text-center">
                                <img th:src="@{'/images/' + ${p.imageUrl}}" class="img-fluid rounded mb-2" style="height: 120px; object-fit: contain;">
                                <small class="fw-bold text-truncate d-block text-dark" th:text="${p.name}"></small>
                                <span class="text-danger fw-bold small" th:text="${#numbers.formatDecimal(p.price, 0, 'POINT', 0, 'COMMA')} + ' ₫'"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script th:inline="none">
    let currentSessionId = null;

    function loadChat(sessionId, userName) {
        currentSessionId = sessionId;
        $('#chat-user-name').text(userName);
        $('#current-session-id').val(sessionId);

        fetchMessages();
        if(window.chatInterval) clearInterval(window.chatInterval);
        window.chatInterval = setInterval(fetchMessages, 4000);
    }

    function fetchMessages() {
        if (!currentSessionId) return;
        $.get('/api/chat/messages/' + currentSessionId, function(data) {
            let html = '';
            data.forEach(msg => {
                // KIỂM TRA ROLE ĐỂ PHÂN BÊN TRÁI / PHẢI
                const isAdmin = (msg.role === 'ROLE_ADMIN' || msg.role === 'ADMIN');
                const alignClass = isAdmin ? 'justify-content-end' : 'justify-content-start';
                const bgClass = isAdmin ? 'bg-primary text-white' : 'bg-white text-dark border';
                const marginClass = isAdmin ? 'ms-5' : 'me-5';
                const borderRadius = isAdmin ? 'rounded-bottom-0 rounded-start-4 rounded-top-4' : 'rounded-top-4 rounded-end-4 rounded-bottom-0';

                html += '<div class="d-flex mb-3 ' + alignClass + '">';
                html += '<div class="d-flex flex-column ' + (isAdmin ? 'align-items-end' : 'align-items-start') + ' ' + marginClass + '" style="max-width: 75%;">';

                // Text content
                if (msg.content) {
                    html += '<div class="p-3 shadow-sm ' + bgClass + ' ' + borderRadius + '">' + msg.content + '</div>';
                }

                // Image
                if (msg.imageUrl) {
                    html += '<img src="/images/' + msg.imageUrl + '" class="mt-2 rounded-3 shadow-sm border" style="max-height: 250px; max-width: 100%; cursor: pointer;" onclick="window.open(this.src)">';
                }

                // Product Card
                if (msg.product) {
                    html += '<a href="/product/' + msg.product.id + '" target="_blank" class="text-decoration-none mt-2">';
                    html += '<div class="bg-white border rounded-3 p-2 shadow-sm d-flex align-items-center" style="width: 260px;">';
                    html += '<img src="/images/' + msg.product.imageUrl + '" width="60" height="60" class="rounded object-fit-contain">';
                    html += '<div class="ms-2 overflow-hidden text-dark text-start">';
                    html += '<small class="fw-bold d-block text-truncate">' + msg.product.name + '</small>';
                    html += '<span class="text-danger fw-bold small">' + new Intl.NumberFormat('vi-VN').format(msg.product.price) + ' ₫</span>';
                    html += '</div></div></a>';
                }

                html += '<small class="text-muted mt-1" style="font-size: 10px;">' + formatTime(msg.createdAt) + (isAdmin ? ' • Đã gửi' : '') + '</small>';
                html += '</div></div>';
            });
            $('#chat-box').html(html);
            // Cuộn xuống cuối nếu có tin nhắn mới
            const cb = document.getElementById('chat-box');
            cb.scrollTop = cb.scrollHeight;
        });
    }

    function sendMessage() {
        let content = $('#msg-input').val().trim();
        let fileInput = document.getElementById('image-input');
        if (!currentSessionId) return alert("Chọn khách hàng trước!");

        if (fileInput.files.length > 0) {
            let formData = new FormData();
            formData.append('sessionId', currentSessionId);
            formData.append('file', fileInput.files[0]);
            $.ajax({
                url: '/api/chat/upload',
                type: 'POST',
                data: formData,
                processData: false,
                contentType: false,
                success: function() { cancelImage(); fetchMessages(); }
            });
        }

        if (content) {
            $.post('/api/chat/send', { sessionId: currentSessionId, content: content }, function() {
                $('#msg-input').val('');
                fetchMessages();
            });
        }
    }

    function sendProduct(productId) {
        if (!currentSessionId) return;
        $.post('/api/chat/send', { sessionId: currentSessionId, content: 'Tư vấn sản phẩm:', productId: productId }, function() {
            fetchMessages();
        });
    }

    function handleEnter(e) { if(e.key === 'Enter') sendMessage(); }

    function previewImage(input) {
        if (input.files && input.files[0]) {
            var reader = new FileReader();
            reader.onload = function(e) {
                $('#img-upload-preview').attr('src', e.target.result);
                $('#image-preview').removeClass('d-none');
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function cancelImage() { $('#image-input').val(''); $('#image-preview').addClass('d-none'); }

    function formatTime(dateString) {
        if(!dateString) return '';
        let d = new Date(dateString);
        return d.getHours() + ':' + (d.getMinutes()<10?'0':'') + d.getMinutes();
    }
</script>
</body>
</html>
