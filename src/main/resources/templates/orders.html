<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<body class="bg-light">

<div th:replace="~{fragments/header :: client-navbar}"></div>
<div style="height: 80px;"></div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <h3 class="fw-bold mb-4 text-dark border-start border-4 border-primary ps-3">Lịch sử đơn hàng</h3>

            <div th:if="${orders == null or orders.isEmpty()}" class="text-center py-5 bg-white rounded-4 shadow-sm">
                <i class="bi bi-box-seam display-1 text-muted opacity-25"></i>
                <h5 class="mt-3 text-muted">Bạn chưa có đơn hàng nào</h5>
                <a th:href="@{/products}" class="btn btn-primary rounded-pill px-4 mt-3 shadow-sm">Mua sắm ngay</a>
            </div>

            <div th:if="${orders != null and !orders.isEmpty()}">
                <div class="card border-0 shadow-sm rounded-4 mb-4 overflow-hidden" th:each="order : ${orders}">

                    <div class="card-header bg-white py-3 border-bottom d-flex justify-content-between align-items-center flex-wrap gap-2">
                        <div>
                            <span class="fw-bold text-primary me-2" th:text="'#' + ${order.code}">#ORD-123</span>
                            <span class="badge bg-light text-dark border small">
                                <i class="bi bi-credit-card me-1"></i>
                                <span th:text="${order.paymentMethod}">COD</span>
                            </span>
                            <span class="text-muted small border-start ps-2 ms-2" th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}"></span>
                        </div>
                        <span class="badge rounded-pill px-3 py-2"
                              th:classappend="${order.status == 'Chờ xác nhận'} ? 'bg-warning text-dark bg-opacity-25' : 'bg-success bg-opacity-10 text-success'"
                              th:text="${order.status}"></span>
                    </div>

                    <div class="card-body p-0">
                        <div class="list-group list-group-flush">
                            <div class="list-group-item p-3 border-0 border-bottom" th:each="detail : ${order.orderDetails}">
                                <div class="d-flex align-items-center">
                                    <div style="width: 70px; height: 70px; flex-shrink: 0;" class="border rounded overflow-hidden p-1 bg-white">
                                        <img th:src="@{'/images/' + ${detail.product.imageUrl}}" class="w-100 h-100 object-fit-contain">
                                    </div>
                                    <div class="ms-3 flex-grow-1">
                                        <h6 class="fw-bold mb-1">
                                            <a th:href="@{/product/{id}(id=${detail.product.id})}" class="text-decoration-none text-dark" th:text="${detail.product.name}"></a>
                                        </h6>
                                        <div class="d-flex justify-content-between align-items-end">
                                            <small class="text-muted">x<span th:text="${detail.quantity}">1</span></small>
                                            <span class="fw-bold text-dark small" th:text="${#numbers.formatDecimal(detail.price, 0, 'POINT', 0, 'COMMA')} + ' ₫'"></span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card-footer bg-light border-0 py-3">
                        <div class="row align-items-center gy-2">
                            <div class="col-md-6">
                                <div class="small text-muted text-truncate">
                                    <i class="bi bi-geo-alt-fill me-1 text-danger"></i> <span th:text="${order.address}"></span>
                                </div>
                            </div>
                            <div class="col-md-6 text-md-end d-flex align-items-center justify-content-md-end justify-content-between">
                                <div class="me-3">
                                    <span class="text-muted small me-1">Tổng tiền:</span>
                                    <span class="fw-bold text-danger fs-5" th:text="${#numbers.formatDecimal(order.totalPrice, 0, 'POINT', 0, 'COMMA')} + ' ₫'"></span>
                                </div>
                                <a th:href="@{/orders/detail/{id}(id=${order.id})}" class="btn btn-outline-primary btn-sm rounded-pill px-3 fw-bold">
                                    Xem chi tiết
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
