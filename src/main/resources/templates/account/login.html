<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* ... (Giữ nguyên CSS của bạn, CSS này đẹp rồi) ... */
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #fff;
            height: 100vh;
            overflow-x: hidden;
        }
        .login-container { min-height: 100vh; display: flex; }
        .login-image-side {
            background: url('https://images.unsplash.com/photo-1614164185128-e4ec99c436d7?q=80&w=2574&auto=format&fit=crop') center/cover no-repeat;
            position: relative; flex: 1; display: flex; align-items: center; justify-content: center; color: white;
        }
        .login-image-side::before { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.7)); }
        .login-quote { position: relative; z-index: 2; text-align: center; padding: 2rem; max-width: 80%; }
        .quote-text { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 1rem; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .login-form-side { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; background: #fff; max-width: 600px; }
        .login-wrapper { width: 100%; max-width: 400px; }
        .login-title { font-size: 2rem; font-weight: 700; color: #1a1a1a; margin-bottom: 0.5rem; }
        .login-subtitle { color: #888; margin-bottom: 2rem; }
        .form-floating > .form-control { border: none; border-bottom: 2px solid #eee; border-radius: 0; padding-left: 0; box-shadow: none !important; }
        .form-floating > .form-control:focus { border-bottom-color: #d0021b; }
        .form-floating > label { padding-left: 0; color: #999; }
        .btn-login { background: #1a1a1a; color: #fff; height: 50px; border-radius: 4px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; width: 100%; border: none; transition: 0.3s; }
        .btn-login:hover { background: #d0021b; color: #fff; transform: translateY(-2px); }
        .social-login { display: flex; gap: 10px; margin-top: 2rem; }
        .btn-social { flex: 1; height: 45px; border: 1px solid #eee; background: #fff; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: 500; color: #555; transition: 0.2s; text-decoration: none; }
        .btn-social:hover { background: #f9f9f9; border-color: #ddd; color: #111; }
        .btn-social img { width: 20px; margin-right: 8px; }
        @media (max-width: 992px) { .login-image-side { display: none; } .login-form-side { max-width: 100%; flex: auto; } }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: client-navbar}"></div>
<div class="login-container">

    <div class="login-image-side">
        <div class="login-quote">
            <h1 class="quote-text">"Thời gian là thứ duy nhất không thể lấy lại."</h1>
            <p class="fs-5 text-white-50">- WatchStore Collection -</p>
        </div>
    </div>

    <div class="login-form-side">
        <div class="login-wrapper">
            <div class="mb-4">
                <h2 class="login-title">Chào mừng trở lại</h2>
                <p class="login-subtitle">Vui lòng nhập thông tin để đăng nhập.</p>
            </div>

            <div th:if="${param.error}" class="alert alert-danger border-0 bg-danger bg-opacity-10 text-danger mb-4">
                <i class="bi bi-exclamation-circle me-2"></i> Email hoặc mật khẩu không chính xác!
            </div>
            <div th:if="${param.registered}" class="alert alert-success border-0 bg-success bg-opacity-10 text-success mb-4">
                <i class="bi bi-check-circle me-2"></i> Đăng ký thành công! Hãy đăng nhập.
            </div>

            <form th:action="@{/account/login}" method="post">

                <div class="form-floating mb-3">
                    <input type="email" name="email" class="form-control" id="user" placeholder="name@example.com" required>
                    <label for="user">Email đăng nhập</label>
                </div>

                <div class="form-floating mb-4">
                    <input type="password" name="password" class="form-control" id="pass" placeholder="Mật khẩu" required>
                    <label for="pass">Mật khẩu</label>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input shadow-none" type="checkbox" id="remember" name="remember-me">
                        <label class="form-check-label text-muted small" for="remember">Ghi nhớ tôi</label>
                    </div>
                    <a th:href="@{/account/forgot-password}" class="text-decoration-none small text-dark fw-bold">Quên mật khẩu?</a>
                </div>

                <button class="btn-login shadow-sm" type="submit">Đăng nhập</button>
            </form>

            <div class="text-center mt-4">
                <span class="text-muted small">Bạn chưa có tài khoản?</span>
                <a th:href="@{/account/register}" class="text-decoration-none fw-bold ms-1 text-danger">Đăng ký ngay</a>
            </div>

            <div class="position-relative mt-5 mb-4 text-center">
                <hr class="text-muted opacity-25">
                <span class="position-absolute top-50 start-50 translate-middle bg-white px-3 text-muted small">Hoặc đăng nhập với</span>
            </div>

            <div class="social-login">
                <a href="#" class="btn-social">
                    <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" alt="Google"> Google
                </a>
                <a href="#" class="btn-social">
                    <img src="https://cdn-icons-png.flaticon.com/512/5968/5968764.png" alt="Facebook"> Facebook
                </a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
