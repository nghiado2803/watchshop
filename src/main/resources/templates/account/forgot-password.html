<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head}"></head>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #fff;
            height: 100vh;
            overflow-x: hidden;
        }

        /* --- LAYOUT CHIA ĐÔI --- */
        .auth-container {
            min-height: 100vh;
            display: flex;
        }

        /* Cột Trái: Ảnh Nghệ Thuật */
        .auth-image-side {
            /* Ảnh mang hơi hướng bí ẩn, tối màu hợp với mood "Quên mật khẩu" */
            background: url('https://images.unsplash.com/photo-1495366691023-cc4eadcc2d7e?q=80&w=2574&auto=format&fit=crop') center/cover no-repeat;
            position: relative;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .auth-image-side::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.8));
        }
        .auth-quote {
            position: relative; z-index: 2;
            text-align: center; padding: 2rem;
            max-width: 80%;
        }
        .quote-text {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem; margin-bottom: 1rem;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* Cột Phải: Form */
        .auth-form-side {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: #fff;
            max-width: 600px;
        }

        .auth-wrapper { width: 100%; max-width: 400px; }

        .auth-title { font-size: 2rem; font-weight: 700; color: #1a1a1a; margin-bottom: 0.5rem; }
        .auth-subtitle { color: #888; margin-bottom: 2rem; font-size: 0.95rem; line-height: 1.5; }

        /* Input Custom (Đồng bộ Login/Register) */
        .form-floating > .form-control {
            border: none;
            border-bottom: 2px solid #eee;
            border-radius: 0;
            padding-left: 0;
            box-shadow: none !important;
        }
        .form-floating > .form-control:focus {
            border-bottom-color: #d0021b;
        }
        .form-floating > label { padding-left: 0; color: #999; }

        /* Button */
        .btn-auth {
            background: #1a1a1a; color: #fff;
            height: 50px; border-radius: 4px;
            font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
            width: 100%; border: none; transition: 0.3s;
        }
        .btn-auth:hover { background: #d0021b; color: #fff; transform: translateY(-2px); }

        /* Icon tròn trang trí */
        .icon-circle {
            width: 60px; height: 60px;
            background: #fdf2f2; color: #d0021b;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; margin-bottom: 1.5rem;
        }

        /* Responsive */
        @media (max-width: 992px) {
            .auth-image-side { display: none; }
            .auth-form-side { max-width: 100%; flex: auto; }
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: client-navbar}"></div>
<div class="auth-container">

    <div class="auth-image-side">
        <div class="auth-quote">
            <h1 class="quote-text">"Đừng để thời gian trôi qua vô nghĩa."</h1>
            <p class="fs-5 text-white-50">- WatchStore Support -</p>
        </div>
    </div>

    <div class="auth-form-side">
        <div class="auth-wrapper">

            <div class="icon-circle">
                <i class="bi bi-key-fill"></i>
            </div>

            <div class="mb-4">
                <h2 class="auth-title">Quên mật khẩu?</h2>
                <p class="auth-subtitle">Đừng lo lắng, chuyện này vẫn thường xảy ra. Hãy nhập email của bạn, chúng tôi sẽ gửi hướng dẫn đặt lại mật khẩu.</p>
            </div>

            <div th:if="${error}" class="alert alert-danger border-0 bg-danger bg-opacity-10 text-danger small">
                <i class="bi bi-exclamation-circle me-2"></i> <span th:text="${error}">Email không tồn tại!</span>
            </div>
            <div th:if="${message}" class="alert alert-success border-0 bg-success bg-opacity-10 text-success small">
                <i class="bi bi-check-circle me-2"></i> <span th:text="${message}">Đã gửi email thành công!</span>
            </div>

            <form th:action="@{/account/forgot-password}" method="post">
                <div class="form-floating mb-4">
                    <input type="email" name="email" class="form-control" id="email" placeholder="name@example.com" required>
                    <label for="email">Địa chỉ Email đăng ký</label>
                </div>

                <button class="btn-auth shadow-sm">Gửi hướng dẫn</button>
            </form>

            <div class="text-center mt-5">
                <a th:href="@{/account/login}" class="text-decoration-none text-muted small fw-bold hover-dark">
                    <i class="bi bi-arrow-left me-1"></i> Quay lại đăng nhập
                </a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
